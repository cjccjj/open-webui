name: Create and publish ARM64 slim Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - v*

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-slim
            type=ref,event=tag,suffix=-slim
            type=sha,prefix=git-,suffix=-slim
            type=semver,pattern={{version}},suffix=-slim
            type=semver,pattern={{major}}.{{minor}},suffix=-slim
            type=raw,value=latest-slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=slim,enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=false

      - name: Build and push ARM64 slim image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.FULL_IMAGE_NAME }}:cache-slim-linux-arm64
          cache-to: type=registry,ref=${{ env.FULL_IMAGE_NAME }}:cache-slim-linux-arm64,mode=max
          sbom: true
          build-args: |
            BUILD_HASH=${{ github.sha }}
            USE_SLIM=true

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect ${{ env.FULL_IMAGE_NAME }}:${{ steps.meta.outputs.version }}